<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pi-Detect — Dashboard</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__brand">
      <span class="topbar__icon">◈</span>
      <span class="topbar__title">Pi<span class="accent">Detect</span></span>
    </div>
    <nav class="topbar__nav">
      <a href="/" class="nav-link">Live Stream</a>
      <a href="/dashboard" class="nav-link active">Dashboard</a>
    </nav>
    <div class="topbar__status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusLabel">Connecting…</span>
    </div>
  </header>

  <main class="dash-grid">
    <div class="dash-kpi-row">
      <div class="kpi-card">
        <div class="kpi-label">Avg FPS</div>
        <div class="kpi-value" id="kpiFps">—</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Avg Inference</div>
        <div class="kpi-value" id="kpiInference">—<small>ms</small></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Total Detections</div>
        <div class="kpi-value" id="kpiTotal">0</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Uptime</div>
        <div class="kpi-value" id="kpiUptime">0s</div>
      </div>
    </div>

    <!-- FPS history chart -->
    <section class="chart-card">
      <h2 class="panel-title">FPS History <span class="chart-legend">(last 60s)</span></h2>
      <canvas id="fpsChart" height="120"></canvas>
    </section>

    <!-- Detection history chart -->
    <section class="chart-card">
      <h2 class="panel-title">Detection Count History</h2>
      <canvas id="detectionChart" height="120"></canvas>
    </section>

    <!-- Object frequency table -->
    <section class="chart-card">
      <h2 class="panel-title">Object Frequency</h2>
      <table class="freq-table" id="freqTable">
        <thead>
          <tr><th>Class</th><th>Count</th><th>Last seen</th></tr>
        </thead>
        <tbody id="freqTableBody">
          <tr><td colspan="3" style="opacity:.5">Waiting for data…</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="/static/js/dashboard.js"></script>
</body>
</html>
