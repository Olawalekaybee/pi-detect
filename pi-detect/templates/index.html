<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pi-Detect — Live Stream</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__brand">
      <span class="topbar__icon">◈</span>
      <span class="topbar__title">Pi<span class="accent">Detect</span></span>
    </div>
    <nav class="topbar__nav">
      <a href="/" class="nav-link active">Live Stream</a>
      <a href="/dashboard" class="nav-link">Dashboard</a>
    </nav>
    <div class="topbar__status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusLabel">Connecting…</span>
    </div>
  </header>

  <main class="main-grid">
    <!-- ── Video feed ─────────────────────────────────────────────── -->
    <section class="video-panel">
      <div class="video-wrapper">
        <img id="videoFeed"
             src="/stream/video"
             alt="Live camera feed"
             class="video-feed"
             onerror="handleStreamError()" />
        <div class="video-overlay" id="videoOverlay">
          <span class="overlay-text">⚠ Stream unavailable</span>
        </div>
      </div>
      <div class="video-actions">
        <button class="btn btn--primary" onclick="takeSnapshot()">📸 Snapshot</button>
        <button class="btn btn--ghost" onclick="toggleFullscreen()">⛶ Fullscreen</button>
      </div>
    </section>

    <!-- ── Stats sidebar ──────────────────────────────────────────── -->
    <aside class="stats-panel">
      <h2 class="panel-title">Live Metrics</h2>

      <div class="stat-card">
        <div class="stat-label">Stream FPS</div>
        <div class="stat-value" id="statFps">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Inference</div>
        <div class="stat-value" id="statInference">—<span class="stat-unit">ms</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Detections</div>
        <div class="stat-value" id="statCount">—</div>
      </div>

      <h3 class="panel-subtitle">Detected Objects</h3>
      <ul class="object-list" id="objectList">
        <li class="object-item object-item--empty">None yet</li>
      </ul>

      <h3 class="panel-subtitle">Quick Config</h3>
      <div class="config-grid" id="configGrid">
        <!-- Filled by JS -->
      </div>

      <a href="/stream/snapshot" target="_blank" class="btn btn--outline btn--full">
        📷 Open Snapshot
      </a>
    </aside>
  </main>

  <script src="/static/js/main.js"></script>
</body>
</html>
